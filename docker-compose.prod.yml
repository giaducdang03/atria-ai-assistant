services:
  atria:
    build: .
    ports:
      - "9090:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ATRIA_API_BASE_URL=${ATRIA_API_BASE_URL}
      - ATRIA_MODEL=${ATRIA_MODEL}
      - DATABASE_URL=${DATABASE_URL:-postgresql://atria:atria@db:5432/atria}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - atria_data:/root/.atria
    depends_on:
      db:
        condition: service_healthy

volumes:
  atria_data: