services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=atria
      - POSTGRES_USER=atria
      - POSTGRES_PASSWORD=atria
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atria -d atria"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
      - ADMINER_DEFAULT_DB=atria
      - ADMINER_DEFAULT_USERNAME=atria
      - ADMINER_DEFAULT_PASSWORD=atria
      - ADMINER_DESIGN=pepa-linha
    depends_on:
      db:
        condition: service_healthy

  atria:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ATRIA_API_BASE_URL=${ATRIA_API_BASE_URL}
      - ATRIA_MODEL=${ATRIA_MODEL}
      - DATABASE_URL=${DATABASE_URL:-postgresql://atria:atria@db:5432/atria}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - atria_data:/root/.atria
    depends_on:
      db:
        condition: service_healthy

volumes:
  atria_data:
  postgres_data:
